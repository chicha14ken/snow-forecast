<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snow Forecast – ゲレンデ選びアシスタント</title>
  <style>
    :root {
      --bg:      #0d1b2a;
      --surface: #162436;
      --card:    #1a2e45;
      --border:  rgba(79,195,247,.18);
      --accent:  #4fc3f7;
      --accent2: #81d4fa;
      --gold:    #ffd54f;
      --silver:  #b0bec5;
      --bronze:  #ffb74d;
      --green:   #66bb6a;
      --red:     #ef5350;
      --orange:  #ffa726;
      --text:    #e0f2fe;
      --muted:   #7a99b0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-text-size-adjust: 100%;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(150deg, #0a1628 0%, #1a3a6b 60%, #0d2040 100%);
      padding: 20px 16px 16px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: clamp(1.15rem, 4vw, 1.7rem); font-weight: 700; letter-spacing: .04em; }
    header h1 span { color: var(--accent); }
    header p  { margin-top: 5px; color: var(--muted); font-size: clamp(.72rem, 2.5vw, .85rem); }

    /* ===== CONTROL PANEL ===== */
    .panel {
      max-width: 860px; margin: 16px auto; padding: 0 14px;
    }
    .panel-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; display: flex;
      flex-direction: column; gap: 14px;
    }

    /* 行1: 日付 + エリア */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .field label {
      display: block; font-size: .7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px;
    }
    .field input[type=date],
    .field select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 9px; padding: 10px 12px;
      font-size: .9rem; outline: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none;
    }
    .field input[type=date]:focus,
    .field select:focus { border-color: var(--accent); }

    /* 行2: モード */
    .mode-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mode-btn {
      padding: 12px 6px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--muted);
      cursor: pointer; font-size: .82rem; font-weight: 600;
      text-align: center; transition: all .18s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .mode-btn .mode-icon { display: block; font-size: 1.4rem; margin-bottom: 3px; }
    .mode-btn.active {
      background: var(--accent); color: #0a1628;
      border-color: var(--accent);
    }

    /* 行3: カスタムスライダー（折りたたみ） */
    .custom-panel {
      display: none; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    }
    .custom-panel.open { display: block; }
    .custom-panel h4 { font-size: .72rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .07em; }
    .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .slider-item label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--text); margin-bottom: 3px; }
    .slider-item label span { color: var(--accent); font-weight: 700; }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; height: 20px; }

    /* 行4: 検索ボタン */
    .search-btn {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--accent); color: #0a1628;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity .18s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: .03em;
    }
    .search-btn:active  { transform: scale(.98); }
    .search-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ===== LOADING ===== */
    .loading { display: none; text-align: center; padding: 48px 20px; }
    .loading.show { display: block; }
    .spinner {
      width: 44px; height: 44px; border: 4px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .75s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .prog-text { font-size: .82rem; color: var(--muted); margin-top: 8px; }
    .prog-bar-wrap { width: min(220px, 80%); height: 4px; background: var(--border); border-radius: 99px; margin: 10px auto 0; overflow: hidden; }
    .prog-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }

    /* ===== ERROR ===== */
    .error-msg {
      display: none; max-width: 860px; margin: 0 auto 12px; padding: 14px 16px;
      background: rgba(239,83,80,.1); border: 1px solid var(--red);
      border-radius: 12px; color: var(--red); text-align: center; font-size: .88rem;
    }
    .error-msg.show { display: block; }

    /* ===== EMPTY STATE ===== */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty-state .ei { font-size: 2.8rem; margin-bottom: 12px; }

    /* ===== RESULTS ===== */
    .results-wrap { max-width: 860px; margin: 0 auto; padding: 0 14px 48px; }
    .results-hdr {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }
    .results-hdr h2 { font-size: .95rem; color: var(--accent2); }
    .results-hdr span { font-size: .75rem; color: var(--muted); }

    /* ===== CARD ===== */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; margin-bottom: 12px; overflow: hidden;
    }
    .card.r1 { border-color: var(--gold); }
    .card.r2 { border-color: var(--silver); }
    .card.r3 { border-color: var(--bronze); }

    /* 天気バナー */
    .wx-banner {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .wx-icon { grid-row: 1/3; font-size: 2.2rem; line-height: 1; align-self: center; }
    .wx-label { font-size: .85rem; font-weight: 700; align-self: end; }
    .wx-sub   { font-size: .72rem; color: var(--muted); align-self: start; margin-top: 1px; }
    .wx-badges {
      grid-column: 1/3;
      display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px;
    }
    .badge {
      padding: 3px 9px; border-radius: 99px;
      font-size: .68rem; font-weight: 700; border: 1px solid;
    }

    /* カード本文 */
    .card-body { padding: 12px 14px 14px; }
    .card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .rank-num { font-size: 1.5rem; font-weight: 900; min-width: 36px; text-align: center; line-height: 1.1; }
    .r1 .rank-num { color: var(--gold); }
    .r2 .rank-num { color: var(--silver); }
    .r3 .rank-num { color: var(--bronze); }
    .rN .rank-num { color: var(--muted); font-size: 1.1rem; }

    .resort-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .resort-sub  { font-size: .68rem; color: var(--muted); }

    /* スコアバー */
    .score-row {
      display: flex; align-items: center; gap: 8px; margin: 10px 0 8px;
    }
    .score-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); min-width: 44px; }
    .score-bar-bg { flex: 1; height: 7px; background: rgba(255,255,255,.07); border-radius: 99px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .6s ease; }
    .penalty-note { font-size: .68rem; color: var(--red); }

    /* メトリクスグリッド */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px; margin-bottom: 8px;
    }
    .metric {
      background: rgba(255,255,255,.04); border-radius: 8px;
      padding: 7px 4px; text-align: center;
    }
    .metric.hl { background: rgba(79,195,247,.08); border: 1px solid rgba(79,195,247,.2); }
    .metric-val   { font-size: .95rem; font-weight: 700; }
    .metric-label { font-size: .6rem; color: var(--muted); margin-top: 2px; }

    /* 積雪注釈 */
    .depth-note {
      font-size: .65rem; color: var(--muted);
      background: rgba(255,255,255,.03); border-radius: 6px;
      padding: 5px 8px; margin-bottom: 8px; line-height: 1.5;
    }
    .depth-note .dn-tag {
      display: inline-block; font-size: .6rem; font-weight: 700;
      border-radius: 4px; padding: 1px 5px; margin-right: 4px;
    }
    .dn-model  { background: rgba(79,195,247,.15); color: var(--accent); }
    .dn-warn   { background: rgba(255,167,38,.15); color: var(--orange); }

    /* 雪質 */
    .snow-quality { display: inline-block; font-size: .75rem; padding: 3px 10px; border-radius: 6px; margin-bottom: 8px; }

    /* スコア内訳 */
    .bd-toggle {
      font-size: .72rem; color: var(--accent); cursor: pointer;
      display: inline-flex; align-items: center; gap: 3px;
      margin-bottom: 4px; user-select: none;
    }
    .bd-panel { display: none; }
    .bd-panel.open { display: block; }
    .bd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 6px; }
    .bd-item { background: rgba(255,255,255,.03); border-radius: 6px; padding: 5px 7px; }
    .bd-name { font-size: .66rem; color: var(--muted); }
    .bd-num  { font-size: .78rem; font-weight: 700; color: var(--accent); }
    .bd-bar  { height: 2px; background: rgba(255,255,255,.08); border-radius: 99px; margin-top: 3px; overflow: hidden; }
    .bd-fill { height: 100%; background: var(--accent); border-radius: 99px; }

    /* 推奨コメント */
    .comment {
      font-size: .78rem; color: var(--accent2); line-height: 1.6;
      background: rgba(79,195,247,.05);
      border-left: 3px solid var(--accent);
      border-radius: 0 7px 7px 0; padding: 7px 10px; margin-top: 8px;
    }

    /* ===== PC 最適化 ===== */
    @media (min-width: 600px) {
      .sliders { grid-template-columns: repeat(3, 1fr); }
      .metrics { grid-template-columns: repeat(4, 1fr); }
      .bd-grid { grid-template-columns: repeat(6, 1fr); }
      .wx-badges { margin-top: 6px; }
    }
  </style>
</head>
<body>

<header>
  <h1>❄️ <span>Snow</span> Forecast</h1>
  <p>長野・新潟・群馬 ゲレンデ選びアシスタント — リアルタイム気象データで今日のベストを探す</p>
</header>

<!-- ===== CONTROL PANEL ===== -->
<div class="panel">
  <div class="panel-inner">

    <!-- 日付 + エリア -->
    <div class="row-2">
      <div class="field">
        <label>📅 日付</label>
        <input type="date" id="targetDate" />
      </div>
      <div class="field">
        <label>🏔️ エリア</label>
        <select id="areaFilter">
          <option value="all">全エリア</option>
          <option value="hakuba">白馬</option>
          <option value="shiga">志賀高原</option>
          <option value="nozawa">野沢・斑尾</option>
          <option value="niigata">新潟</option>
          <option value="myoko">妙高</option>
          <option value="gunma">群馬</option>
        </select>
      </div>
    </div>

    <!-- モード選択 -->
    <div>
      <div class="field" style="margin-bottom:8px;">
        <label>🎯 モード選択</label>
      </div>
      <div class="mode-row">
        <div class="mode-btn active" data-mode="powder" onclick="setMode('powder')">
          <span class="mode-icon">🌨️</span>パウダー重視
        </div>
        <div class="mode-btn" data-mode="sunny" onclick="setMode('sunny')">
          <span class="mode-icon">☀️</span>晴天重視
        </div>
        <div class="mode-btn" data-mode="custom" onclick="setMode('custom')">
          <span class="mode-icon">⚙️</span>カスタム
        </div>
      </div>
    </div>

    <!-- カスタムスライダー（カスタム選択時のみ展開） -->
    <div class="custom-panel" id="customPanel">
      <h4>⚙️ スコア重み（合計は自動調整）</h4>
      <div class="sliders">
        <div class="slider-item">
          <label>❄️ 雪質 <span id="wSnowQLabel">25</span>%</label>
          <input type="range" id="wSnowQ" min="0" max="100" value="25" oninput="updateLabel('wSnowQ','wSnowQLabel')" />
        </div>
        <div class="slider-item">
          <label>🌨️ 累積降雪 <span id="wAccumLabel">25</span>%</label>
          <input type="range" id="wAccum" min="0" max="100" value="25" oninput="updateLabel('wAccum','wAccumLabel')" />
        </div>
        <div class="slider-item">
          <label>📦 積雪深 <span id="wDepthLabel">15</span>%</label>
          <input type="range" id="wDepth" min="0" max="100" value="15" oninput="updateLabel('wDepth','wDepthLabel')" />
        </div>
        <div class="slider-item">
          <label>☀️ 晴天度 <span id="wSunLabel">15</span>%</label>
          <input type="range" id="wSun" min="0" max="100" value="15" oninput="updateLabel('wSun','wSunLabel')" />
        </div>
        <div class="slider-item">
          <label>🌡️ 気温 <span id="wTempLabel">10</span>%</label>
          <input type="range" id="wTemp" min="0" max="100" value="10" oninput="updateLabel('wTemp','wTempLabel')" />
        </div>
        <div class="slider-item">
          <label>🏔️ 標高 <span id="wElevLabel">10</span>%</label>
          <input type="range" id="wElev" min="0" max="100" value="10" oninput="updateLabel('wElev','wElevLabel')" />
        </div>
      </div>
    </div>

    <!-- 検索ボタン -->
    <button class="search-btn" id="searchBtn" onclick="fetchAndRank()">🔍 ゲレンデを探す</button>
  </div>
</div>

<!-- ローディング -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:.85rem;">気象データを取得中…</p>
  <div class="prog-text" id="progText"></div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
</div>

<!-- エラー -->
<div class="error-msg" id="errorMsg"></div>

<!-- 結果 -->
<div class="results-wrap" id="resultsWrap">
  <div class="empty-state">
    <div class="ei">🏔️</div>
    <p>日付とモードを選んで「ゲレンデを探す」を押してください</p>
  </div>
</div>

<script>
// ============================================================
// ゲレンデデータ
// elev   = ゲレンデトップ標高(m) — APIの elevation= に使用
// baseElev = ベース標高(m) — 表示用
// ============================================================
const RESORTS = [
  // 白馬
  { id:'happo',     name:'白馬八方尾根',      area:'hakuba',  lat:36.677, lon:137.762, elev:1831, baseElev:760,  desc:'北アルプス直下のパウダー聖地' },
  { id:'goryu',     name:'エイブル白馬五竜',  area:'hakuba',  lat:36.674, lon:137.766, elev:1515, baseElev:820,  desc:'47と連結、広大なゲレンデ' },
  { id:'cortina',   name:'白馬コルチナ',      area:'hakuba',  lat:36.756, lon:137.831, elev:1495, baseElev:880,  desc:'天然雪100%、深いパウダー' },
  { id:'iwatake',   name:'白馬岩岳',          area:'hakuba',  lat:36.713, lon:137.807, elev:1289, baseElev:810,  desc:'360度パノラマ絶景' },
  // 志賀高原
  { id:'yokote',    name:'志賀高原 横手山',   area:'shiga',   lat:36.756, lon:138.510, elev:2307, baseElev:1620, desc:'日本最高所リフト、霧氷が美しい' },
  { id:'yakebi',    name:'志賀高原 焼額山',   area:'shiga',   lat:36.715, lon:138.477, elev:2009, baseElev:1500, desc:'W杯開催実績、急斜面が揃う' },
  { id:'ryuoo',     name:'竜王スキーパーク',  area:'shiga',   lat:36.781, lon:138.389, elev:1930, baseElev:1080, desc:'世界最大級ロープウェイ、絶景' },
  // 野沢・斑尾
  { id:'nozawa',    name:'野沢温泉スキー場',  area:'nozawa',  lat:36.933, lon:138.449, elev:1650, baseElev:570,  desc:'46コース、温泉も楽しめる' },
  { id:'madarao',   name:'斑尾高原スキー場',  area:'nozawa',  lat:36.981, lon:138.378, elev:1382, baseElev:1000, desc:'ツリーラン日本一' },
  // 新潟
  { id:'naeba',     name:'苗場スキー場',      area:'niigata', lat:36.852, lon:138.669, elev:1518, baseElev:900,  desc:'大斜面が名物、豊富な積雪' },
  { id:'kagura',    name:'かぐらスキー場',    area:'niigata', lat:36.867, lon:138.713, elev:1845, baseElev:750,  desc:'最長シーズン、深雪に定評' },
  { id:'joetsu',    name:'上越国際スキー場',  area:'niigata', lat:37.018, lon:138.779, elev:900,  baseElev:200,  desc:'4ゾーン、新幹線アクセス良好' },
  // 妙高
  { id:'myoko',     name:'妙高杉ノ原',        area:'myoko',   lat:36.935, lon:138.212, elev:1855, baseElev:950,  desc:'日本海寒波、極上パウダー' },
  { id:'akakura',   name:'赤倉観光リゾート',  area:'myoko',   lat:36.918, lon:138.205, elev:1300, baseElev:700,  desc:'コース多彩、眺望抜群' },
  { id:'ikenohira', name:'池の平温泉スキー場',area:'myoko',   lat:36.959, lon:138.220, elev:900,  baseElev:560,  desc:'妙高の玄関口、初中級向け' },
  // 群馬
  { id:'kusatsu',   name:'草津温泉スキー場',  area:'gunma',   lat:36.627, lon:138.591, elev:2010, baseElev:1200, desc:'最長8km・標高差926m' },
  { id:'manza',     name:'万座温泉スキー場',  area:'gunma',   lat:36.653, lon:138.422, elev:1800, baseElev:1500, desc:'粉雪の万座、極上パウダー' },
  { id:'kawaba',    name:'川場スキー場',      area:'gunma',   lat:36.754, lon:139.017, elev:1560, baseElev:820,  desc:'非圧雪エリア充実、日帰り向け' },
  { id:'marunuma',  name:'丸沼高原スキー場',  area:'gunma',   lat:36.866, lon:139.205, elev:2000, baseElev:1400, desc:'11月〜5月ロングシーズン' },
  { id:'oze',       name:'尾瀬岩鞍スキー場',  area:'gunma',   lat:36.789, lon:139.158, elev:1600, baseElev:900,  desc:'関東最大級、多彩なコース' },
];

// ============================================================
// 状態
// ============================================================
const DEBUG = false;
let currentMode = 'powder';

window.addEventListener('DOMContentLoaded', () => {
  const jst = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
  const y = jst.getFullYear();
  const m = String(jst.getMonth()+1).padStart(2,'0');
  const d = String(jst.getDate()).padStart(2,'0');
  document.getElementById('targetDate').value = `${y}-${m}-${d}`;
});

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  document.getElementById('customPanel').classList.toggle('open', mode === 'custom');
}

function updateLabel(sid, lid) {
  document.getElementById(lid).textContent = document.getElementById(sid).value;
}

function toggleBd(id) {
  const p = document.getElementById('bdp-'+id);
  const a = document.getElementById('bda-'+id);
  if (!p) return;
  p.classList.toggle('open');
  a.textContent = p.classList.contains('open') ? '▲' : '▼';
}

// ============================================================
// 重み取得
// ============================================================
function getWeights() {
  if (currentMode === 'powder') return { snowQuality:.30, accumSnow:.25, depth:.20, sun:.05, temp:.10, elev:.10 };
  if (currentMode === 'sunny')  return { snowQuality:.05, accumSnow:.10, depth:.10, sun:.50, temp:.15, elev:.10 };
  const vals = ['wSnowQ','wAccum','wDepth','wSun','wTemp','wElev']
    .map(id => parseInt(document.getElementById(id).value));
  const t = vals.reduce((a,b)=>a+b,0) || 1;
  const [snowQuality,accumSnow,depth,sun,temp,elev] = vals.map(v=>v/t);
  return { snowQuality, accumSnow, depth, sun, temp, elev };
}

// ============================================================
// 日付ユーティリティ
// ============================================================
function addDays(s, n) {
  const d = new Date(s+'T00:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

// ============================================================
// Open-Meteo API 取得
//
// 戦略:
//   1) historical-forecast-api で過去8日 〜 当日 を取得
//      → 降雪量(過去2日) + 当日気象フォールバック
//   2) forecast-api で当日〜翌日 を取得
//      → 当日の降雪予報・気象（forecast の方が当日予報精度が高い）
//
// 積雪深の取り扱い:
//   Open-Meteo forecast API の hourly=snow_depth (m) を利用。
//   JST 06:00-15:00 の中央値で外れ値を抑え、
//   取れない場合は当日最終の有効値を使う。
// ============================================================
async function fetchWeather(resort, date) {
  const VARS = 'snowfall_sum,precipitation_sum,'
    + 'temperature_2m_max,temperature_2m_min,cloudcover_mean,windspeed_10m_max';

  const base = `latitude=${resort.lat}&longitude=${resort.lon}`
    + `&elevation=${resort.elev}&daily=${VARS}&timezone=Asia%2FTokyo`;

  const d7ago = addDays(date, -7);

  // 2つのAPIを並列取得
  const forecastUrl = `https://api.open-meteo.com/v1/forecast?${base}&hourly=snow_depth&start_date=${date}&end_date=${addDays(date,1)}`;
  const historicalUrl = `https://historical-forecast-api.open-meteo.com/v1/forecast?${base}&start_date=${d7ago}&end_date=${date}`;

  const [hRes, fRes] = await Promise.all([
    fetch(historicalUrl),
    fetch(forecastUrl),
  ]);

  if (!hRes.ok && !fRes.ok) throw new Error('データ取得失敗');

  const hData = hRes.ok ? await hRes.json() : null;
  const fData = fRes.ok ? await fRes.json() : null;

  // 単位変換
  function snowCm(v, u) {
    const n = parseFloat(v);
    if (v==null || isNaN(n)) return 0;
    return (typeof u==='string' && u.toLowerCase()==='mm') ? n/10 : Math.max(0, n);
  }
  function depthCm(v, u) {
    const n = parseFloat(v);
    if (v==null || isNaN(n)) return null;
    return (typeof u==='string' && u.toLowerCase()==='m') ? n*100 : Math.max(0, n);
  }

  function median(arr) {
    if (!arr.length) return null;
    const sorted = [...arr].sort((a,b)=>a-b);
    const mid = Math.floor(sorted.length/2);
    return sorted.length % 2 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
  }

  // 日付インデックス検索
  function idx(data, dt) {
    return (data?.daily?.time ?? []).indexOf(dt);
  }

  // ---- 積雪深: forecast hourly から JST 06:00-15:00 の中央値 ----
  let depth = null;
  let depthDate = null;

  if (fData) {
    const fu = fData.hourly_units ?? {};
    const ft = fData.hourly?.time ?? [];
    const fd = fData.hourly?.snow_depth ?? [];

    const dayVals = [];
    const windowVals = [];
    for (let i = 0; i < ft.length; i++) {
      const ts = ft[i] ?? '';
      if (!ts.startsWith(date)) continue;
      const cm = depthCm(fd[i], fu.snow_depth);
      if (cm == null) continue;
      dayVals.push(cm);
      const hour = parseInt(ts.slice(11,13), 10);
      if (hour >= 6 && hour <= 15) windowVals.push(cm);
    }

    depth = median(windowVals);
    if (depth == null && dayVals.length) depth = dayVals[dayVals.length - 1];
    depthDate = depth == null ? null : date;

    if (DEBUG) {
      console.log('[snow-depth-debug]', {
        resort: resort.name,
        requestUrl: forecastUrl,
        hasHourlySnowDepth: Array.isArray(fd),
        snowDepthUnit: fu.snow_depth,
        sampleDepthValuesCm: dayVals.slice(0, 8).map(v => Math.round(v*10)/10),
        computedDepthCm: depth,
      });
    }
  }

  // ---- 当日の気象: forecast 優先 → historical フォールバック ----
  let todaySnow=0, tempMax=0, tempMin=-5, cloud=50, windMax=0, precip=0;

  if (fData) {
    const fu = fData.daily_units ?? {};
    const fd = fData.daily ?? {};
    const i0 = idx(fData, date);
    const j  = i0 >= 0 ? i0 : 0;
    todaySnow = snowCm(fd.snowfall_sum?.[j],   fu.snowfall_sum);
    tempMax   = fd.temperature_2m_max?.[j] ?? 0;
    tempMin   = fd.temperature_2m_min?.[j] ?? -5;
    cloud     = fd.cloudcover_mean?.[j]    ?? 50;
    windMax   = fd.windspeed_10m_max?.[j]  ?? 0;
    precip    = fd.precipitation_sum?.[j]  ?? 0;
  } else if (hData) {
    const hu = hData.daily_units ?? {};
    const hd = hData.daily ?? {};
    const i  = idx(hData, date);
    if (i >= 0) {
      todaySnow = snowCm(hd.snowfall_sum?.[i],   hu.snowfall_sum);
      tempMax   = hd.temperature_2m_max?.[i] ?? 0;
      tempMin   = hd.temperature_2m_min?.[i] ?? -5;
      cloud     = hd.cloudcover_mean?.[i]    ?? 50;
      windMax   = hd.windspeed_10m_max?.[i]  ?? 0;
      precip    = hd.precipitation_sum?.[i]  ?? 0;
    }
  }

  // ---- 過去2日の降雪量（3日累計用） ----
  let s1=0, s2=0;
  if (hData) {
    const hu = hData.daily_units ?? {};
    const hd = hData.daily ?? {};
    const i1 = idx(hData, addDays(date,-1));
    const i2 = idx(hData, addDays(date,-2));
    if (i1>=0) s1 = snowCm(hd.snowfall_sum?.[i1], hu.snowfall_sum);
    if (i2>=0) s2 = snowCm(hd.snowfall_sum?.[i2], hu.snowfall_sum);
  }

  return { todaySnow, accumSnow: s2+s1+todaySnow, depth, depthDate, cloud, tempMax, tempMin, windMax, precip };
}

// ============================================================
// スコア計算
// ============================================================
function calcScore(w, weights, resort) {
  const { todaySnow, accumSnow, depth, cloud, tempMax, tempMin, windMax } = w;

  let snowQualityScore = 0;
  if (todaySnow > 0) {
    const tf = Math.max(0, Math.min(100, (-tempMax+5)/15*100));
    const sf = Math.min(todaySnow/15*100, 100);
    snowQualityScore = tf*.6 + sf*.4;
  }
  const accumScore     = Math.min(accumSnow/50*100, 100);
  const depthScore     = depth == null ? 50 : Math.min(depth/200*100, 100);
  const sunScore       = Math.max(0, 100-cloud);
  const tempTrendScore = Math.max(0, Math.min(100, (-tempMax+3)/10*60 + (-tempMin+0)/10*40));
  const elevScore      = Math.min(Math.max((resort.elev-1000)/1300*100, 0), 100);

  let windPenalty = 0;
  if      (windMax >= 20) windPenalty = 40;
  else if (windMax >= 15) windPenalty = 25;
  else if (windMax >= 10) windPenalty = 12;
  const blizzardPenalty = (windMax >= 12 && cloud >= 70) ? 10 : 0;

  const raw =
    snowQualityScore * weights.snowQuality +
    accumScore       * weights.accumSnow   +
    depthScore       * weights.depth       +
    sunScore         * weights.sun         +
    tempTrendScore   * weights.temp        +
    elevScore        * weights.elev;

  const total = Math.max(0, Math.round(raw - windPenalty - blizzardPenalty));

  return {
    total,
    snowfall:         w.todaySnow.toFixed(1),
    accumSnow:        w.accumSnow.toFixed(1),
    depth:            w.depth == null ? null : Math.round(w.depth),
    depthDate:        w.depthDate,
    cloud:            Math.round(cloud),
    tempMax:          tempMax.toFixed(1),
    tempMin:          tempMin.toFixed(1),
    wind:             Math.round(windMax),
    precip:           (w.precip??0).toFixed(1),
    snowQualityScore: Math.round(snowQualityScore),
    accumScore:       Math.round(accumScore),
    depthScore:       Math.round(depthScore),
    sunScore:         Math.round(sunScore),
    tempTrendScore:   Math.round(tempTrendScore),
    elevScore:        Math.round(elevScore),
    windPenalty, blizzardPenalty,
  };
}

// ============================================================
// 天気情報
// ============================================================
function wxInfo(cloud, snow, wind) {
  let icon, label, bg;
  if (wind >= 15 && cloud >= 70) { icon='🌪️'; label='吹雪・強風'; bg='rgba(239,83,80,.12)'; }
  else if (parseFloat(snow)>=20) { icon='🌨️'; label='大雪';      bg='rgba(79,195,247,.15)'; }
  else if (parseFloat(snow)>= 5) { icon='❄️';  label='降雪あり'; bg='rgba(79,195,247,.10)'; }
  else if (cloud <= 20)          { icon='☀️';  label='快晴';     bg='rgba(255,213,79,.12)'; }
  else if (cloud <= 45)          { icon='🌤️'; label='晴れ時々曇り'; bg='rgba(255,213,79,.07)'; }
  else if (cloud <= 70)          { icon='⛅'; label='曇り';      bg='rgba(176,190,197,.08)'; }
  else if (parseFloat(snow)>= 1) { icon='🌨️'; label='雪模様';   bg='rgba(79,195,247,.10)'; }
  else                            { icon='☁️'; label='曇り';     bg='rgba(176,190,197,.06)'; }

  const badges = [];
  if      (parseFloat(snow)>=15) badges.push({l:'🔥パウダー',   c:'#81d4fa', b:'rgba(79,195,247,.15)'});
  else if (parseFloat(snow)>= 5) badges.push({l:'❄️新雪あり',  c:'#b3e5fc', b:'rgba(79,195,247,.10)'});
  if      (cloud<=30 && wind<10) badges.push({l:'👁️視界良好',  c:'#ffd54f', b:'rgba(255,213,79,.12)'});
  else if (wind>=15)              badges.push({l:'💨強風注意',  c:'#ef9a9a', b:'rgba(239,83,80,.12)'});
  if      (wind>=20)              badges.push({l:'🚨リフト危険', c:'#ef5350', b:'rgba(239,83,80,.2)'});
  else if (wind>=15)              badges.push({l:'⚠️リフト注意', c:'#ffb74d', b:'rgba(255,183,77,.15)'});

  return { icon, label, bg, badges };
}

function snowQLabel(tempMax, snowfall) {
  if (parseFloat(snowfall)<=0) return { label:'降雪なし', color:'#7a99b0' };
  const t = parseFloat(tempMax);
  if (t<=-8) return {label:'🥶 超サラサラパウダー', color:'#81d4fa'};
  if (t<=-3) return {label:'❄️ サラサラパウダー',   color:'#4fc3f7'};
  if (t<= 0) return {label:'🌨️ ドライパウダー',     color:'#b3e5fc'};
  if (t<= 3) return {label:'💧 やや湿雪',           color:'#ffd54f'};
  return             {label:'💦 重い湿雪',           color:'#ff8a65'};
}

function genComment(w, resort) {
  const parts = [];
  const snow  = parseFloat(w.snowfall);
  const accum = parseFloat(w.accumSnow);

  if      (snow>=20) parts.push(`🌨️ 大雪！新雪 <strong>${w.snowfall}cm</strong> — パウダー最高潮`);
  else if (snow>=10) parts.push(`🌨️ 新雪 <strong>${w.snowfall}cm</strong>。フレッシュなパウダー期待大`);
  else if (snow>= 3) parts.push(`🌨️ 新雪 ${w.snowfall}cm。朝イチならパウダー残ってる可能性あり`);
  else               parts.push(`新雪は少なめ (${w.snowfall}cm)。圧雪バーンでのクルーズがメイン`);

  if (accum>=30 && accum>snow+5) parts.push(`直近3日累計 <strong>${w.accumSnow}cm</strong> でベース充実`);

  if (w.depth == null) {
    parts.push('積雪深データなし。公式情報を確認してください');
  } else if (w.depth>=200) parts.push(`積雪深 <strong>${w.depth}cm</strong>！下地は申し分なし`);
  else if (w.depth>=100) parts.push(`積雪深 ${w.depth}cm、十分なベース`);
  else if (w.depth< 50)  parts.push(`⚠️ 積雪深 ${w.depth}cm — 公式情報を確認して`);

  if      (w.cloud<=20) parts.push(`☀️ 快晴！山頂からの絶景が楽しめます`);
  else if (w.cloud<=50) parts.push(`🌤️ 晴れ間あり。視界良好`);
  else if (w.cloud>=80) parts.push(`🌥️ 曇り〜雪模様。視界に注意`);

  if      (w.wind>=20) parts.push(`🚨 強風 (${w.wind}m/s) — リフト運休の可能性高`);
  else if (w.wind>=15) parts.push(`⚠️ 強風 (${w.wind}m/s) — 上部リフト注意`);
  else if (w.wind>=10) parts.push(`💨 やや風あり (${w.wind}m/s)`);

  return parts.join('。');
}

// ============================================================
// カード描画
// ============================================================
function renderCard(resort, rank, w) {
  const rankClass = rank<=3 ? `r${rank}` : 'rN';
  const medal = rank===1 ? '🥇' : rank===2 ? '🥈' : rank===3 ? '🥉' : `#${rank}`;
  const wxi   = wxInfo(w.cloud, w.snowfall, w.wind);
  const sq    = snowQLabel(w.tempMax, w.snowfall);
  const comment = genComment(w, resort);
  const windColor = w.wind>=15 ? '#ef5350' : w.wind>=10 ? '#ffb74d' : 'var(--muted)';
  const penaltyPt = w.windPenalty + w.blizzardPenalty;

  const badgesHtml = wxi.badges.map(b=>
    `<span class="badge" style="color:${b.c};border-color:${b.c};background:${b.b}">${b.l}</span>`
  ).join('');

  // 積雪深の注釈
  let depthNoteHtml = '';
  if (w.depth != null) {
    const isToday = w.depthDate === document.getElementById('targetDate').value;
    const tag  = isToday ? '予報値' : `${w.depthDate}実績`;
    const cls  = isToday ? 'dn-model' : 'dn-model';
    depthNoteHtml = `<div class="depth-note">
      <span class="dn-tag ${cls}">${tag}</span>
      積雪深はゲレンデトップ付近（${resort.elev.toLocaleString()}m）の<strong>気象モデル推計値</strong>です。
      実際の積雪はゲレンデ公式情報をご確認ください。
    </div>`;
  } else {
    depthNoteHtml = `<div class="depth-note">
      <span class="dn-tag dn-warn">データなし</span>
      このゲレンデの積雪深は気象モデルでカバーされていません。公式サイトでご確認ください。
    </div>`;
  }

  const bdItems = [
    {n:'❄️ 雪質',   v: w.snowQualityScore},
    {n:'🌨️ 累積',   v: w.accumScore},
    {n:'📦 積雪深',  v: w.depthScore},
    {n:'☀️ 晴天',   v: w.sunScore},
    {n:'🌡️ 気温',   v: w.tempTrendScore},
    {n:'🏔️ 標高',   v: w.elevScore},
  ].map(b=>`<div class="bd-item">
    <div class="bd-name">${b.n}</div>
    <div class="bd-num">${b.v}<span style="font-size:.6rem;color:var(--muted)">/100</span></div>
    <div class="bd-bar"><div class="bd-fill" style="width:${b.v}%"></div></div>
  </div>`).join('');

  return `
  <div class="card ${rankClass}">
    <div class="wx-banner" style="background:${wxi.bg}">
      <div class="wx-icon">${wxi.icon}</div>
      <div class="wx-label">${wxi.label}</div>
      <div class="wx-sub">${w.tempMax}°C / ${w.tempMin}°C &nbsp;·&nbsp; 雲量 ${w.cloud}% &nbsp;·&nbsp; 風 ${w.wind}m/s</div>
      <div class="wx-badges">${badgesHtml}</div>
    </div>
    <div class="card-body">
      <div class="card-head">
        <div class="rank-num">${medal}</div>
        <div style="flex:1;min-width:0">
          <div class="resort-name">${resort.name}</div>
          <div class="resort-sub">${resort.desc} &nbsp;·&nbsp; TOP ${resort.elev.toLocaleString()}m / BASE ${resort.baseElev.toLocaleString()}m</div>
        </div>
      </div>

      <div class="score-row">
        <div class="score-val">${w.total}</div>
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${Math.min(w.total,100)}%"></div></div>
        ${penaltyPt>0 ? `<div class="penalty-note">▼風${penaltyPt}pt</div>` : ''}
      </div>

      <div class="metrics">
        <div class="metric hl">
          <div class="metric-val" style="color:#81d4fa">${w.snowfall}<span style="font-size:.6rem">cm</span></div>
          <div class="metric-label">当日新雪</div>
        </div>
        <div class="metric hl">
          <div class="metric-val" style="color:#4fc3f7">${w.accumSnow}<span style="font-size:.6rem">cm</span></div>
          <div class="metric-label">3日累計</div>
        </div>
        <div class="metric hl">
          <div class="metric-val" style="color:#29b6f6">${w.depth==null ? 'データなし' : `${w.depth}<span style="font-size:.6rem">cm</span>`}</div>
          <div class="metric-label">積雪深★</div>
        </div>
        <div class="metric">
          <div class="metric-val" style="color:${windColor}">${w.wind}<span style="font-size:.6rem">m/s</span></div>
          <div class="metric-label">最大風速</div>
        </div>
      </div>

      ${depthNoteHtml}

      <div class="snow-quality" style="background:rgba(255,255,255,.05);color:${sq.color}">${sq.label}</div>

      <div class="bd-toggle" onclick="toggleBd('${resort.id}')">
        スコア内訳 <span id="bda-${resort.id}">▼</span>
      </div>
      <div class="bd-panel" id="bdp-${resort.id}">
        <div class="bd-grid">${bdItems}</div>
      </div>

      <div class="comment">${comment}</div>
    </div>
  </div>`;
}

// ============================================================
// メイン
// ============================================================
async function fetchAndRank() {
  const date = document.getElementById('targetDate').value;
  if (!date) { alert('日付を選択してください'); return; }

  const area    = document.getElementById('areaFilter').value;
  const targets = area === 'all' ? RESORTS : RESORTS.filter(r => r.area === area);
  const weights = getWeights();

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('resultsWrap').innerHTML = '';

  let done = 0;
  const total = targets.length;
  const progText = document.getElementById('progText');
  const progBar  = document.getElementById('progBar');
  function tick() {
    done++;
    progText.textContent = `${total}ゲレンデ中 ${done}件取得完了`;
    progBar.style.width  = `${Math.round(done/total*100)}%`;
  }

  try {
    const settled = await Promise.allSettled(
      targets.map(r => fetchWeather(r, date).then(v => { tick(); return v; }))
    );

    const scored = [];
    settled.forEach((res, i) => {
      if (res.status === 'fulfilled') {
        scored.push({ resort: targets[i], weather: calcScore(res.value, weights, targets[i]) });
      }
    });

    if (scored.length === 0) throw new Error('データを取得できませんでした');
    scored.sort((a,b) => b.weather.total - a.weather.total);

    const modeLabel = currentMode==='powder' ? '🌨️ パウダー重視'
                    : currentMode==='sunny'  ? '☀️ 晴天重視' : '⚙️ カスタム';
    const dateStr = new Date(date+'T00:00:00').toLocaleDateString('ja-JP',
      {year:'numeric', month:'long', day:'numeric', weekday:'short'});

    let html = `<div class="results-hdr">
      <h2>${modeLabel} ランキング</h2>
      <span>📅 ${dateStr} / ${scored.length}ゲレンデ比較</span>
    </div>`;
    scored.forEach((s,i) => { html += renderCard(s.resort, i+1, s.weather); });

    // ★注釈フッター
    html += `<div style="font-size:.68rem;color:var(--muted);margin-top:8px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;line-height:1.6">
      <strong>★ 積雪深について</strong><br>
      積雪深はゲレンデトップ付近のOpen-Meteo気象モデル推計値です（ERA5/GFSベース）。
      実際のゲレンデ積雪とは差が生じる場合があります。
      正確な積雪情報は各スキー場の公式サイトでご確認ください。
    </div>`;

    document.getElementById('resultsWrap').innerHTML = html;

  } catch(e) {
    document.getElementById('errorMsg').textContent = `⚠️ エラー: ${e.message}`;
    document.getElementById('errorMsg').classList.add('show');
  } finally {
    document.getElementById('loading').classList.remove('show');
    btn.disabled = false;
  }
}
</script>
